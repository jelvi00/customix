server:
  port: 3030

spring:
  threads:
    virtual:
      enabled: true

  application:
    name: customix

  datasource:
    url: jdbc:postgresql://db:5432/customix
    username: todo_define
    password: todo_define
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
